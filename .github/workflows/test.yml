name: test

# V6.12 收尾 ①: CI 门禁——任何 PR 不能合并除非 build pass
#   之前 177 stale test 在本地断断续续沉淀 4+ 版本, 因为没强制门禁
#   现在 GitHub Actions 每次 push 自动跑——
#   任何 future V6.x PR 都得先过 build 关, 防 debt 复发
#
# V6.12.22: macos-14 → macos-latest
#   pbxproj objectVersion=77 (Xcode 26.5) macos-14 runner 只有 Xcode 15.x
#   拒绝打开 project (error code 74, "future Xcode project file format")
#   macos-latest 走 GitHub 最新 macOS runner (Xcode 16+/26+)
#
# V6.12.23: deployment target 26.5 → 15.5
#   macos-latest (2026/06) = macOS 15.7.7 + Xcode 16.4
#   pbxproj deployment target 26.5 > runner macOS 15.7.7 拒绝 test
#   降 15.5 (项目无 macOS 26 API 实际使用) → Xcode 16.4 兼容
#
# V6.12.24: 拆 build + test job
#   177 stale test 跑超 20 min GitHub Actions timeout
#   拆 2 job: build (5 min 门禁, 必过) + test (30 min, 修 stale test 期间 status 是 known issue)
#   PR 门禁靠 build pass; test job 失败不阻止 merge 但发警告
#
# V6.14.5: 加 DerivedData cache
#   之前 build 10-18 min 是大头, 修 batchMove 后 test 1.95s 忽略不计
#   actions/cache@v4 缓存 ~/Library/Developer/Xcode/DerivedData/ImageGallery-*
#   key = pbxproj hash (pbxproj 改 → cache miss → 全量; .swift 改 → cache hit → 增量)
#   跑几次后: build 1-3 min (增量 1.x min, 10+ x 提速)
#   build + test job 都加 (test job 复用 build job 写入的 cache)
#
# V6.22.4: 加 bug-scan job (静态扫描)
#   之前 V6.20 audit 是手动 grep + 经验, 1 次性发现 17 bug, 但后续 PR 没法自动防回归
#   新 bug-scan.py 6 个 pattern (HIGH/MED/LOW) 扫 prod code, HIGH > 0 → fail PR
#   跑在 ubuntu-latest (Python 3 即可, 不需 macOS runner, < 5 sec)
#   baseline 11 findings (9 HIGH + 2 MED) 记入 docs/bug-scan-baseline.md
#   V6.22.5 修这 11 bug, 之后 baseline 应清零

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bug-scan:
    name: Bug Pattern Scan
    # V6.22.4: 静态扫描门禁——HIGH > 0 fail PR, 防 debug print / fatalError / 空 catch 等
    #   regression 复发 (V6.20 audit 后发现的 11 个 bug 全部进了 V6.22.5)
    #   ubuntu-latest 即可, Python 3.11+, 不需 macOS runner
    #   跟 build/test job 并行——独立, 不互相 block
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        # V6.22.4: ubuntu-latest 不默认带 Python 3 (有 python3 但版本老)
        #   bug-scan.py 用 stdlib only, 无第三方依赖, 3.11+ 即可
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run bug-scan (HIGH > 0 gate)
        run: |
          chmod +x bug-scan.py
          ./bug-scan.py --check

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bug-scan-report-${{ github.run_id }}
          path: docs/bug-scan-baseline.md
          retention-days: 7

  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/ImageGallery-*
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build
        run: |
          xcodebuild \
            -project ImageGallery.xcodeproj \
            -scheme ImageGallery \
            -destination 'platform=macOS' \
            build

  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DerivedData
        # V6.14.5: 跟 build job 同 cache key——复用 build job 写入的 DerivedData
        #   actions/cache 是跨 job 共享的 (key 相同即命中)
        #   build job 跑完, test job 拿同一 cache 增量 test
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/ImageGallery-*
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Test (50 classes — V6.14.7 full expansion)
        # V6.12.25: 起步 4 个本机已验证的 ContentViewModel class
        # V6.14.4: +1 ContentViewModelBatchTests (修了 UndoManager 强引用环, 7 test 全过)
        # V6.14.6: +11 class 解锁 (16 class, 1100+ tests, 0 hang, 11 known fail)
        # V6.14.7: +39 test file (50 class 全 test target, ~1800+ tests, 0 hang)
        # 已知 fail 修法 (V6.14.7 同 commit):
        #   - 1-2 行 stale test: 改 test expectation
        #   - production 行为: 改 production code
        #   - 设计选择 (RecycleBin purge): 改 test 匹配 production (跟 V6.13.1 同根)
        # -only-testing: 多 flag 限定范围
        run: |
          xcodebuild \
            -project ImageGallery.xcodeproj \
            -scheme ImageGallery \
            -destination 'platform=macOS' \
            -only-testing:ImageGalleryTests/ContentViewModelSmokeTests \
            -only-testing:ImageGalleryTests/ContentViewModelInitTests \
            -only-testing:ImageGalleryTests/ContentViewModelStateTests \
            -only-testing:ImageGalleryTests/ContentViewModelRecycleBinTests \
            -only-testing:ImageGalleryTests/ContentViewModelBatchTests \
            -only-testing:ImageGalleryTests/ContentViewModelImportTests \
            -only-testing:ImageGalleryTests/ContentViewModelMiscTests \
            -only-testing:ImageGalleryTests/ContentViewModelSelectionTests \
            -only-testing:ImageGalleryTests/PopoverChromeTests \
            -only-testing:ImageGalleryTests/ClosureButtonHoverTests \
            -only-testing:ImageGalleryTests/FilterUnifiedPopoverInitialStateTests \
            -only-testing:ImageGalleryTests/FilterUnifiedPopoverResizeTests \
            -only-testing:ImageGalleryTests/BatchRenameTemplateTests \
            -only-testing:ImageGalleryTests/SmartFolderCreateTests \
            -only-testing:ImageGalleryTests/ImageLoaderTests \
            -only-testing:ImageGalleryTests/RecycleBinErrorPropagationTests \
            -only-testing:ImageGalleryTests/RecycleBinServiceTests \
            -only-testing:ImageGalleryTests/RecycleBinServiceIntegrationTests \
            -only-testing:ImageGalleryTests/AccentColorTests \
            -only-testing:ImageGalleryTests/AppearanceModeTests \
            -only-testing:ImageGalleryTests/BatchSetRatingMathTests \
            -only-testing:ImageGalleryTests/CategoryRowViewTests \
            -only-testing:ImageGalleryTests/CategoryRowViewChevronSwapTests \
            -only-testing:ImageGalleryTests/DragReorderMathTests \
            -only-testing:ImageGalleryTests/EmptyStateTests \
            -only-testing:ImageGalleryTests/FilterCategoryTests \
            -only-testing:ImageGalleryTests/FilterStateTests \
            -only-testing:ImageGalleryTests/GridLayoutTests \
            -only-testing:ImageGalleryTests/ImageGallerySchemaTests \
            -only-testing:ImageGalleryTests/ImageGalleryTests \
            -only-testing:ImageGalleryTests/ImageImporterErrorTests \
            -only-testing:ImageGalleryTests/KeyboardShortcutRoutingTests \
            -only-testing:ImageGalleryTests/MasonryMathTests \
            -only-testing:ImageGalleryTests/MultiSelectMathTests \
            -only-testing:ImageGalleryTests/OptionListPopoverControllerTests \
            -only-testing:ImageGalleryTests/PhotoSearchTests \
            -only-testing:ImageGalleryTests/PhotoShapeTests \
            -only-testing:ImageGalleryTests/PhotoStatsFilterTests \
            -only-testing:ImageGalleryTests/PhotoStatsTests \
            -only-testing:ImageGalleryTests/PhotoStatsSnapshotTests \
            -only-testing:ImageGalleryTests/PhotoStorageTests \
            -only-testing:ImageGalleryTests/PopoverItemFactoryTests \
            -only-testing:ImageGalleryTests/PopoverStyleTokensTests \
            -only-testing:ImageGalleryTests/RatingStarsMathTests \
            -only-testing:ImageGalleryTests/SaveWithLogErrorTests \
            -only-testing:ImageGalleryTests/SelectionStateTests \
            -only-testing:ImageGalleryTests/SettingsCategoryTests \
            -only-testing:ImageGalleryTests/SidebarSelectionTests \
            -only-testing:ImageGalleryTests/SidebarStyleTests \
            -only-testing:ImageGalleryTests/SortOptionTests \
            -only-testing:ImageGalleryTests/ThumbnailDensityTests \
            -only-testing:ImageGalleryTests/ThumbnailLayoutModeTests \
            -only-testing:ImageGalleryTests/ToastInfoTests \
            -only-testing:ImageGalleryTests/ToolbarButtonSizeTests \
            -only-testing:ImageGalleryTests/ToolbarControllerStartupStateTests \
            -only-testing:ImageGalleryTests/ToolbarHarmonyTests \
            -only-testing:ImageGalleryTests/UndoManagerFocusedValueKeyTests \
            -only-testing:ImageGalleryTests/UserSettingsTests \
            test

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_id }}
          path: ~/Library/Developer/Xcode/DerivedData/ImageGallery-*/Logs/Test/*.xcresult
          retention-days: 7

  uitest:
    name: UI Test (XCUITest smoke)
    # V6.22.10: Layer 2 e2e 自动化 — 4 个 smoke flow (launch + 3 个 follow-up skip)
    #   跑 XCUITest target, 防 V6.22.6-9 类 UX regression
    #   macos-latest (需要 GUI session), 20 min timeout
    #   跟 build job 同 DerivedData cache key (pbxproj 改 → cache miss → 重 build)
    runs-on: macos-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DerivedData
        # V6.22.10: 跟 build/test job 同一 cache key — 复用 build 产物
        #   pbxproj 改 → cache miss → 全量 build (本 commit 改了 pbxproj)
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/ImageGallery-*
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: UI Test (XCUITest smoke — AppLaunchTest + 3 skipped)
        # V6.22.10: 当前 1 个 test pass (AppLaunchTest), 3 个 skip (V6.22.11 follow-up)
        #   CI gate: pass 或 skip 都算 OK, fail 算 fail
        run: |
          xcodebuild \
            -project ImageGallery.xcodeproj \
            -scheme ImageGallery \
            -destination 'platform=macOS' \
            -only-testing:ImageGalleryUITests \
            test

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uitest-xcresult-${{ github.run_id }}
          path: ~/Library/Developer/Xcode/DerivedData/ImageGallery-*/Logs/Test/*.xcresult
          retention-days: 7
